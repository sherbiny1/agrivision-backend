<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verified – AgriVision AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #f0f4f0 50%, #e0f2e1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.10), 0 2px 8px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 520px;
        }

        .card-header {
            background: linear-gradient(135deg, #2d6a4f, #52b788);
            padding: 56px 48px 44px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 16px;
            display: block;
        }

        .card-header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
        }

        .card-body {
            padding: 48px;
            text-align: center;
        }

        .card-body h2 {
            color: #1b4332;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card-body .desc {
            color: #4a5568;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .open-btn {
            display: inline-block;
            background: linear-gradient(135deg, #2d6a4f, #52b788);
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            padding: 16px 52px;
            border-radius: 50px;
            box-shadow: 0 4px 16px rgba(45, 106, 79, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 28px;
        }

        .open-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(45, 106, 79, 0.45);
        }

        .status-box {
            background: #f8fdf8;
            border-radius: 14px;
            padding: 22px;
            border: 1px solid #e8f5e9;
            margin-top: 4px;
        }

        .status-box .title {
            color: #2d6a4f;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .status-box .subtitle {
            color: #718096;
            font-size: 13px;
        }

        .card-footer {
            background: #f8fdf8;
            padding: 20px 48px;
            text-align: center;
            border-top: 1px solid #e8f5e9;
        }

        .card-footer p {
            color: #a0aec0;
            font-size: 12px;
        }

        /* Tablet */
        @media (max-width: 768px) {
            .card-header {
                padding: 44px 36px 36px;
            }

            .card-body {
                padding: 36px;
            }

            .card-footer {
                padding: 18px 36px;
            }

            .logo {
                width: 68px;
                height: 68px;
            }

            .card-header h1 {
                font-size: 24px;
            }

            .card-body h2 {
                font-size: 20px;
            }
        }

        /* Mobile */
        @media (max-width: 480px) {
            body {
                padding: 0;
                align-items: flex-start;
            }

            .card {
                border-radius: 0;
                min-height: 100vh;
            }

            .card-header {
                padding: 40px 24px 32px;
            }

            .card-body {
                padding: 28px 24px;
            }

            .card-footer {
                padding: 16px 24px;
            }

            .logo {
                width: 60px;
                height: 60px;
                border-radius: 16px;
            }

            .card-header h1 {
                font-size: 22px;
            }

            .card-body h2 {
                font-size: 18px;
            }

            .card-body .desc {
                font-size: 14px;
            }

            .open-btn {
                padding: 14px 40px;
                font-size: 15px;
            }
        }
    </style>
    <script>
        setTimeout(function () {
            window.location.href = 'agrivision://home';
        }, 2000);
    </script>
</head>

<body>
    <div class="card">
        <!-- Header -->
        <div class="card-header">
            <img src="https://files.catbox.moe/g5u2if.png" alt="AgriVision AI" class="logo" />
            <h1>Email Confirmed!</h1>
            <p>AgriVision AI</p>
        </div>

        <!-- Body -->
        <div class="card-body">
            <h2>Welcome, {{NAME}}! 🌿</h2>
            <p class="desc">
                Your email has been successfully verified.<br />
                Redirecting you to the app...
            </p>

            <a href="agrivision://home" class="open-btn">Open AgriVision AI</a>

            <div class="status-box">
                <p class="title">Your account is now fully activated!</p>
                <p class="subtitle">If the app didn't open automatically, tap the button above.</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <p>© {{YEAR}} AgriVision AI. All rights reserved.</p>
        </div>
    </div>
</body>

</html>
