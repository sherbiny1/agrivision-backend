<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset Code – AgriVision AI</title>
    <style>
        @media only screen and (max-width: 620px) {
            .email-card {
                width: 100% !important;
                border-radius: 0 !important;
            }

            .email-body {
                padding: 28px 20px !important;
            }

            .email-header {
                padding: 28px 20px 20px 20px !important;
            }

            .email-footer {
                padding: 16px 20px !important;
            }

            .brand-title {
                font-size: 20px !important;
            }

            .otp-code {
                font-size: 30px !important;
                letter-spacing: 8px !important;
                padding: 14px 20px !important;
            }
        }
    </style>
</head>

<body style="margin:0;padding:0;background-color:#f0f4f0;font-family:'Segoe UI',Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f4f0;padding:16px 0;">
        <tr>
            <td align="center" style="padding:0 12px;">
                <table class="email-card" width="580" cellpadding="0" cellspacing="0"
                    style="background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.10);max-width:580px;width:100%;">

                    <!-- Header (compact) -->
                    <tr>
                        <td class="email-header"
                            style="background:linear-gradient(135deg,#2d6a4f 0%,#52b788 100%);padding:32px 40px 24px 40px;text-align:center;">
                            <div style="margin-bottom:10px;">
                                <img src="https://files.catbox.moe/g5u2if.png" alt="AgriVision AI" width="56"
                                    height="56"
                                    style="border-radius:14px;display:block;margin:0 auto;max-width:56px;height:auto;" />
                            </div>
                            <h1 class="brand-title"
                                style="margin:0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-0.3px;">
                                AgriVision AI</h1>
                        </td>
                    </tr>

                    <!-- Body (focused on code) -->
                    <tr>
                        <td class="email-body" style="padding:32px 40px 28px 40px;text-align:center;">
                            <p style="margin:0 0 6px;color:#1b4332;font-size:16px;font-weight:600;">
                                Hi {{NAME}}, reset your password
                            </p>
                            <p style="margin:0 0 24px;color:#718096;font-size:13px;">
                                Enter this code in the app to reset your password
                            </p>

                            <!-- OTP Code (the hero) -->
                            <table cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" style="padding:0 0 20px;">
                                        <div class="otp-code"
                                            style="display:inline-block;background:linear-gradient(135deg,#fef2f2,#fecaca);border:2px solid #f87171;border-radius:16px;padding:18px 36px;font-size:38px;font-weight:800;letter-spacing:12px;color:#7f1d1d;font-family:'Courier New',monospace;">
                                            {{CODE}}
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin:0 0 20px;color:#a0aec0;font-size:12px;">
                                This code expires in 10 minutes
                            </p>
                            <!-- Footer -->
                    <tr>
                        <td class="email-footer"
                            style="background-color:#f8fdf8;padding:18px 40px;text-align:center;border-top:1px solid #e8f5e9;">
                            <p style="margin:0 0 4px;color:#718096;font-size:11px;">If you didn't request this, ignore
                                this email.</p>
                            <p style="margin:0;color:#a0aec0;font-size:10px;">© {{YEAR}} AgriVision AI</p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
